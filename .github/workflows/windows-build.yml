name: Build Prism Launcher Windows (Release)

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-2022

    env:
      VCPKG_ROOT: ${{ runner.temp }}/vcpkg
      CMAKE_BUILD_TYPE: Release

    steps:

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup vcpkg
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
          cd "$env:VCPKG_ROOT"
          .\bootstrap-vcpkg.bat

      - name: Install Qt with vcpkg
        shell: powershell
        run: |
          cd "$env:VCPKG_ROOT"
          .\vcpkg install qt6-base:x64-windows
          .\vcpkg install qt6-tools:x64-windows

      - name: Configure CMake
        shell: powershell
        run: |
          cmake -S . -B build ^
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" ^
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: Build project
        shell: powershell
        run: |
          cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }}

      - name: Run tests
        shell: powershell
        run: |
          ctest --test-dir build --config ${{ env.CMAKE_BUILD_TYPE }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prism-launcher-windows
          path: build/${{ env.CMAKE_BUILD_TYPE }}/PrismLauncher.exe
