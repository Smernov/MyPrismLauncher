name: Build Prism Launcher Windows

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build type (Debug or Release)'
        required: false
        default: 'Release'

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-2022

    env:
      BUILD_TYPE: ${{ github.event.inputs['build-type'] }}

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      # 2. Setup Qt and MSVC (через Chocolatey + vcpkg)
      - name: Setup Qt 6.10.2
        uses: jurplel/install-qt-action@v2
        with:
          version: '6.10.2'
          host: 'windows'
          arch: 'win64_msvc'

      # 3. Configure CMake
      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      # 4. Build
      - name: Build project
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      # 5. Optional: run tests
      - name: Run tests
        run: ctest --test-dir build --config ${{ env.BUILD_TYPE }}

      # 6. Package: copy .exe to artifact
      - name: Upload Windows .exe
        uses: actions/upload-artifact@v3
        with:
          name: prism-launcher-windows
          path: build/${{ env.BUILD_TYPE }}/PrismLauncher.exe
