name: Build Prism Launcher for Windows

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build type (Debug or Release)'
        required: false
        default: 'Release'

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-2022

    env:
      BUILD_TYPE: ${{ github.event.inputs['build-type'] }}

    steps:
      # 1) Скачиваем код
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      # 2) Устанавливаем Qt через актуальный action
      - name: Install Qt 6 (win64 MSVC2022)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          host: 'windows'
          arch: 'win64_msvc2022_64'

      # 3) Конфигурируем CMake
      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      # 4) Собираем проект
      - name: Build project
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      # 5) Запускаем тесты (опционально)
      - name: Run tests
        run: ctest --test-dir build --config ${{ env.BUILD_TYPE }}

      # 6) Загружаем .exe как артефакт
      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: prism-launcher-windows
          path: build/${{ env.BUILD_TYPE }}/PrismLauncher.exe
